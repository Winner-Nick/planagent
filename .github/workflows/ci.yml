name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        working-directory: backend
        run: ruff check src tests
      - name: Unit tests
        working-directory: backend
        # real_api / real_wechat tests auto-skip when their env vars aren't set
        # (see tests/conftest.py). The integration job below re-runs them with
        # the secret injected.
        run: pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: backend
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Real DeepSeek tests
        working-directory: backend
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: pytest -q -m real_api

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build
